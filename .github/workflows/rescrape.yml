name: Re-scraping periódico

on:
  schedule:
    - cron: "0 6 * * 1"   # toda segunda-feira, 06:00 UTC
  workflow_dispatch: {}    # permite rodar manualmente pela aba Actions

permissions:
  contents: write          # necessário para comitar o chroma_db/ atualizado

defaults:
  run:
    working-directory: backend   # monorepo: backend mora em backend/

jobs:
  rescrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar pipeline de ingestão
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m scripts.run_pipeline

      - name: Comitar vector store atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chroma_db/
          git diff --staged --quiet || git commit -m "chore: re-scrape automático do conteúdo do INT"
          git push
